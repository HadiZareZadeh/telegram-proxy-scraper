# Copy this file to config.yaml and fill in your values.
# Get api_id / api_hash from https://my.telegram.org/apps

telegram:
  api_id: 12345678      # <- replace with your api_id
  api_hash: "your_api_hash_here"
  session_name: mtproto_scraper  # stored in sessions/
  # Channels / groups you already joined (usernames, invite links, or numeric IDs)
  # Examples: "@proxychannel", "https://t.me/proxychannel", -1001234567890
  sources:
    - "@ShadowProxy66"
    - "@Gp_config"
    - "@meliproxyy"
    - "@PinkProxy"
  # How many recent messages to scan per source (null = all history; can be slow)
  messages_per_source: 500

storage:
  database_file: data/catalog.db
  subscription_file: data/subscription.txt

subscription_server:
  # 0.0.0.0 = reachable from other devices on your LAN (phones, tablets, etc.)
  host: 0.0.0.0
  port: 8765
  # lan_ip: 192.168.1.105  # optional: force LAN URL/QR when VPN/TUN is active

xray:
  # null = auto-detect PATH, then xray/xray.exe or xray/xray
  bin: null

v2ray:
  # HTTP URL fetched through each V2Ray proxy (latency = TTFB). Default is an empty 204.
  # Set test_bytes > 0 only if you want to also read that many body bytes.
  test_url: http://www.gstatic.com/generate_204
  test_bytes: 0
  test_timeout: 8.0
  ping_concurrency: 20
  # Stop probing once this many working servers are found (0 = unlimited)
  max_working: 0
  # Fastest, most recently checked working servers exported to subscription.txt (0 = unlimited)
  subscription_limit: 100
  # Expand HTTP subscription URLs and inline Base64 blobs into individual share links
  expand_subscriptions: true
  subscription_fetch_timeout: 15.0
  # Max HTTP sub URLs fetched per Telegram message (inline Base64 is always scanned)
  subscription_max_urls_per_message: 5
  # Download .npv4 / .npv attachments and extract embedded V2Ray share links (non-encrypted only)
  parse_napsternet_attachments: true

scraper:
  # How often main.py re-pings MTProto + V2Ray catalogs (seconds; 0 = disabled)
  proxy_check_interval: 1800
  # Pause before reconnecting after a dropped Telegram connection (seconds)
  reconnect_delay: 5

mtproto:
  ping_concurrency: 100
  ping_timeout: 8.0
  # Stop probing once this many working proxies are found; keeps fastest by latency (0 = unlimited)
  max_working: 0

probe:
  # Adaptive probe scheduler (explore / exploit / recover)
  # Skip chronic failures until their backoff window expires.
  respect_backoff: true
